<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0e0c"/>
<title>Elevator Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,400;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden}
body{background:#0f0e0c;color:#e8e0d0;font-family:'Source Serif 4',Georgia,serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#3a3020;border-radius:2px}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:#0f0e0c;overflow:hidden}
.hdr{background:linear-gradient(180deg,#1a1814,#0f0e0c);border-bottom:1px solid #2a2418;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;color:#c8a96e}
.hdr-sub{font-style:italic;font-size:0.72rem;color:#7a6a50;margin-top:2px}
.pbar-wrap{height:2px;background:#2a2418;margin-top:8px;border-radius:2px}
.pbar-fill{height:100%;background:linear-gradient(90deg,#c8a96e,#e8c88e);border-radius:2px;transition:width 0.5s}
.pbar-lbl{font-size:0.62rem;color:#7a6a50;margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.proj-list{padding:14px;display:flex;flex-direction:column;gap:10px}
.btn-primary{width:100%;padding:13px;background:#c8a96e;color:#0f0e0c;border:none;border-radius:8px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;cursor:pointer}
.proj-card{background:#1a1814;border:1px solid #3a3020;border-radius:10px;padding:14px;cursor:pointer}
.proj-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.proj-name{font-family:'Playfair Display',serif;font-size:1rem;color:#e8e0d0}
.proj-meta{font-size:0.68rem;color:#7a6a50;margin-top:2px;font-style:italic}
.proj-pct{font-family:'Playfair Display',serif;font-size:1.3rem;color:#c8a96e}
.proj-pbar{height:2px;background:#2a2418;margin-top:8px;border-radius:2px}
.proj-pbar-fill{height:100%;background:linear-gradient(90deg,#c8a96e,#e8c88e);border-radius:2px;transition:width .4s}
.proj-btns{display:flex;gap:8px;margin-top:10px}
.btn-sm{font-size:0.68rem;padding:6px 12px;border-radius:5px;border:1px solid #3a3020;background:#221f18;color:#c8b898;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
.btn-danger{color:#e07070;border-color:#5a2020}
.btn-gold{color:#c8a96e;border-color:#c8a96e}
.empty-state{text-align:center;padding:50px 20px;color:#7a6a50;font-style:italic}
.form-wrap{padding:16px}
.form-card{background:#1a1814;border:1px solid #3a3020;border-radius:10px;padding:18px}
.form-row{margin-bottom:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-lbl{display:block;font-size:0.65rem;color:#7a6a50;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.form-inp{width:100%;background:#221f18;border:1px solid #3a3020;border-radius:6px;padding:10px 11px;color:#e8e0d0;font-family:'Source Serif 4',serif;font-size:0.9rem;outline:none;-webkit-appearance:none;appearance:none}
.form-inp:focus{border-color:#c8a96e}
.btn-secondary{width:100%;padding:11px;background:transparent;color:#7a6a50;border:1px solid #3a3020;border-radius:7px;font-size:0.85rem;cursor:pointer;margin-top:8px}
.back-btn{background:none;border:none;color:#c8a96e;font-size:0.75rem;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;padding:0}
.mod-tabs{display:flex;overflow-x:auto;border-bottom:1px solid #2a2418;background:#0f0e0c;flex-shrink:0;scrollbar-width:none}
.mod-tabs::-webkit-scrollbar{display:none}
.mod-tab{flex-shrink:0;padding:8px 12px;background:none;border:none;border-bottom:2px solid transparent;color:#5a5040;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:65px;transition:all .15s}
.mod-tab.active{border-bottom-color:#c8a96e;color:#c8a96e}
.t-lbl{font-size:0.55rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.t-dot{width:4px;height:4px;border-radius:50%;border:1px solid currentColor}
.mod-tab.complete .t-dot{background:currentColor}
.task-section{padding:14px 12px 100px}
.mod-hdr{margin-bottom:16px}
.mod-tag{font-size:0.62rem;color:#c8a96e;text-transform:uppercase;letter-spacing:.1em}
.mod-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:#e8e0d0;margin-top:2px}
.mod-prog{font-size:0.75rem;color:#7a6a50;margin-top:2px;font-style:italic}
/* task */
.task-wrap{position:relative;margin-bottom:2px;border-radius:8px;overflow:hidden}
.task-dismiss-bg{position:absolute;inset:0;background:#5a1a1a;display:flex;align-items:center;justify-content:flex-end;padding-right:18px;border-radius:8px;font-size:0.7rem;color:#e07070;text-transform:uppercase;letter-spacing:.08em}
.task-item{display:flex;align-items:flex-start;gap:11px;padding:12px 10px;background:#0f0e0c;border-radius:8px;border:1px solid transparent;position:relative;touch-action:pan-y;-webkit-user-select:none;user-select:none;transition:background .15s}
.task-item.flagged{border-color:#7a4a10;background:#140f08}
.task-check{width:22px;height:22px;min-width:22px;border-radius:5px;border:1.5px solid #3a3020;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;background:transparent;flex-shrink:0}
.task-check.checked{background:#c8a96e;border-color:#c8a96e}
.chk-svg{width:12px;height:12px;stroke:#0f0e0c;stroke-width:2.5;fill:none}
.task-body{flex:1;min-width:0}
.task-text{font-size:0.88rem;color:#c8b898;line-height:1.45}
.task-acts{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center}
.task-btn{background:none;border:none;color:#5a5040;cursor:pointer;font-size:0.65rem;padding:2px 0;text-transform:uppercase;letter-spacing:.05em}
.flag-btn{background:none;border:none;cursor:pointer;font-size:0.78rem;padding:2px 4px;border-radius:4px;line-height:1}
.flag-btn.active{background:#3a2008}
.note-inp{width:100%;margin-top:6px;background:#1a1814;border:1px solid #3a3020;border-radius:5px;padding:7px 9px;color:#c8b898;font-family:'Source Serif 4',serif;font-size:0.82rem;resize:none;min-height:55px;outline:none;-webkit-appearance:none}
.note-inp:focus{border-color:#c8a96e}
.photo-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.photo-thumb{width:50px;height:50px;border-radius:5px;object-fit:cover;border:1px solid #3a3020}
.photo-del-wrap{position:relative}
.photo-del{position:absolute;top:-4px;right:-4px;width:15px;height:15px;border-radius:50%;background:#c0392b;border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.divider{height:1px;background:#1a1814;margin:0 4px}
/* completed section */
.section-toggle{width:100%;background:none;border-radius:7px;padding:9px 12px;font-size:0.7rem;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.section-toggle.completed{border:1px solid #1a3a1a;color:#5a9a5a}
.section-toggle.dismissed{border:1px dashed #3a1a1a;color:#7a4040;margin-top:8px}
.completed-item{padding:11px 10px;background:#0a150a;border-radius:8px;margin-top:4px;border:1px solid #1a3a1a;display:flex;align-items:flex-start;gap:10px}
.completed-check{width:20px;height:20px;min-width:20px;border-radius:5px;background:#2a5a2a;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.completed-body{flex:1;min-width:0}
.completed-text{font-size:0.85rem;color:#4a8a4a;text-decoration:line-through;line-height:1.4}
.completed-date{font-size:0.62rem;color:#3a6a3a;margin-top:3px;font-style:italic}
.completed-note{font-size:0.72rem;color:#3a6a3a;margin-top:3px;font-style:italic}
/* dismissed section */
.dismissed-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;background:#150a0a;border-radius:7px;margin-top:4px;border:1px solid #3a1a1a}
.dismissed-text{font-size:0.82rem;color:#5a3030;font-style:italic}
.restore-btn{font-size:0.65rem;color:#c8a96e;background:none;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
/* add task */
.add-task-wrap{margin-top:16px}
.add-task-btn{width:100%;padding:10px;background:none;border:1px dashed #3a3020;border-radius:7px;color:#7a6a50;font-size:0.75rem;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
.add-task-form{background:#1a1814;border:1px solid #3a3020;border-radius:8px;padding:12px;margin-top:6px}
.add-task-inp{width:100%;background:#221f18;border:1px solid #3a3020;border-radius:6px;padding:9px 11px;color:#e8e0d0;font-family:'Source Serif 4',serif;font-size:0.88rem;outline:none;-webkit-appearance:none;margin-bottom:8px}
.add-task-inp:focus{border-color:#c8a96e}
.add-task-btns{display:flex;gap:8px}
.add-task-save{flex:1;padding:9px;background:#c8a96e;color:#0f0e0c;border:none;border-radius:6px;font-size:0.82rem;cursor:pointer;font-weight:700}
.add-task-cancel{flex:1;padding:9px;background:transparent;color:#7a6a50;border:1px solid #3a3020;border-radius:6px;font-size:0.82rem;cursor:pointer}
/* bottom nav */
.bot-nav{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-top:1px solid #2a2418;background:#0f0e0c;flex-shrink:0;padding-bottom:calc(9px + env(safe-area-inset-bottom))}
.nav-btn{background:#1a1814;border:1px solid #3a3020;color:#c8a96e;font-size:0.7rem;padding:8px 14px;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-ctr{font-size:0.65rem;color:#5a5040;letter-spacing:.08em}
.dl-btn{background:#1a1814;border:1px solid #c8a96e;color:#c8a96e;font-size:0.7rem;padding:7px 12px;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
/* modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#1a1814;border:1px solid #3a3020;border-radius:12px;padding:22px;width:100%;max-width:320px}
.modal-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:#c8a96e;margin-bottom:8px}
.modal-text{font-size:0.82rem;color:#7a6a50;margin-bottom:16px;line-height:1.5}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:10px;border-radius:7px;font-size:0.82rem;cursor:pointer}
.modal-cancel{background:transparent;border:1px solid #3a3020;color:#7a6a50}
.modal-confirm{background:#8b1a1a;border:none;color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
'use strict';
var h = React.createElement;
var useState = React.useState;
var useRef = React.useRef;

var MODULES = [
  {id:'survey', label:'Site Survey', perFloor:[], tasks:['Hoistway wire','Pit channel','Travel cable','Telephone','Scope','Photos','Piston layout','Seismic plates','Contacts','Scanning','Cab drawings','Fixtures','Jack build sheet','Site Survey sheet','Controller prints']},
  {id:'machineroom', label:'Machine Room', perFloor:[], tasks:['Smoke detectors covered','Lighting','Main disconnect','110V disconnect','GFCI plug','Old controller removed','Hydro tank replacement','Hydro pump wired','Hoistway wire run','Piping to controller from hoistway','Oil line run','Paint floor','Isolation coupler','Muffler','Controller prints','Controller manual','Old maintenance logs']},
  {id:'hoistway', label:'Hoistway', perFloor:['Door locks installed','Spirators','Relating cables','Brackets pinned','Hall door rollers','Door pickups','Lunar key access','Door rollers','Vein plates','Floor zone switches','Floor label stencils'], tasks:['Smoke detectors covered','Measurements for wire','Door locks installed','Spirators','Relating cables','Brackets pinned','Travelers hung','Hoistway wire run','Upper limit','Lower limit','Hall door rollers','Anti-snag','Access switch','Door pickups','Lunar key access','Door rollers','Toe guard','Remove old hoistway wire','Remove old travelers','Vein plates','Floor zone switches','Floor label stencils']},
  {id:'carexterior', label:'Car Exterior', perFloor:[], tasks:['Old equipment dismantled','Guard rails','Kick plates','Door operator','Inspection station','Fan','Light box','Gate switch','Car door restrictor','Guide shoes','Seismic plates','Landing system','Cam','Troughing','Flex to COP','Leveling system','Door clutch','Light curtain','Light curtain controller','Hatch plug','Toe guard','Data tags']},
  {id:'carinterior', label:'Car Interior', perFloor:[], tasks:['Cab door removed','Measurements','Car door rollers','COP cut','Door jamb arrows','Hand rails','Toe guard','Remove COP','Dismantle cab','Remove floors','Reclad interior','Install wall panels','Install ceiling','Pad pins','Remove stainless protection','Cab door reinstalled','Install COP','TSBC plate']},
  {id:'pit', label:'Pit', perFloor:[], tasks:['Lighting','Stop switch','Buffers','Jack removed','GFCI switch','Flood switch','PVC sheath installed','Jack installed','Pit channel','Ladder']},
  {id:'hallways', label:'Hallways', perFloor:['Hall call buttons','Pickup indicators','Floor protection','Braille','Lighting sufficient'], tasks:['Hall call buttons','Pickup indicators','Door jambs reclad','Fire panel installed','Floor protection','Braille','Lighting sufficient']},
  {id:'building', label:'Building', perFloor:[], tasks:['Machine room door','Phone line','Machine room empty','Hallway lighting','Fire extinguisher','Ventilation requirements']}
];

function buildTasks(mod, numFloors) {
  var n = Math.max(1, parseInt(numFloors) || 1);
  var out = [];
  mod.tasks.forEach(function(name) {
    if (mod.perFloor.indexOf(name) >= 0) {
      for (var f = 1; f <= n; f++) {
        out.push({id: mod.id + '__' + name.replace(/\s+/g,'_') + '__f' + f, name: name + ' -- Floor ' + f, custom: false});
      }
    } else {
      out.push({id: mod.id + '__' + name.replace(/\s+/g,'_'), name: name, custom: false});
    }
  });
  return out;
}

function overallPct(proj) {
  var ts = proj.taskState || {};
  var total = 0, done = 0;
  MODULES.forEach(function(m) {
    buildTasks(m, proj.numFloors).forEach(function(t) {
      if (!ts[t.id] || !ts[t.id].dismissed) { total++; if (ts[t.id] && ts[t.id].checked) done++; }
    });
    var custom = (proj.customTasks && proj.customTasks[m.id]) || [];
    custom.forEach(function(t) {
      if (!ts[t.id] || !ts[t.id].dismissed) { total++; if (ts[t.id] && ts[t.id].checked) done++; }
    });
  });
  return total ? Math.round(done / total * 100) : 0;
}

function modPct(mod, proj) {
  var ts = proj.taskState || {};
  var tasks = buildTasks(mod, proj.numFloors);
  var custom = (proj.customTasks && proj.customTasks[mod.id]) || [];
  var all = tasks.concat(custom);
  var active = all.filter(function(t) { return !ts[t.id] || !ts[t.id].dismissed; });
  if (!active.length) return 100;
  var done = active.filter(function(t) { return ts[t.id] && ts[t.id].checked; }).length;
  return Math.round(done / active.length * 100);
}

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString('en-CA', {year:'numeric',month:'short',day:'numeric'});
}

function saveAll(p) { try { localStorage.setItem('elevpro_v4', JSON.stringify(p)); } catch(e) {} }
function loadAll() { try { return JSON.parse(localStorage.getItem('elevpro_v4') || '[]'); } catch(e) { return []; } }

// ---- TASK COMPONENT ----
function Task(props) {
  var task = props.task;
  var ts = props.ts || {};
  var swState = useState(0); var swipeX = swState[0]; var setSwipeX = swState[1];
  var snState = useState(false); var showNote = snState[0]; var setShowNote = snState[1];
  var startX = useRef(null);
  var fileRef = useRef(null);
  var camRef = useRef(null);

  function onTS(e) { startX.current = e.touches[0].clientX; }
  function onTM(e) {
    if (startX.current === null) return;
    var dx = e.touches[0].clientX - startX.current;
    if (dx < 0) setSwipeX(Math.max(dx, -85));
  }
  function onTE() {
    if (swipeX < -60) props.onDismiss();
    setSwipeX(0); startX.current = null;
  }
  function addPhoto(file) {
    var r = new FileReader();
    r.onload = function(e) { props.onPhoto(e.target.result); };
    r.readAsDataURL(file);
  }

  return h('div', {className:'task-wrap'},
    h('div', {className:'task-dismiss-bg'}, 'Dismiss'),
    h('div', {
      className: 'task-item' + (ts.flagged ? ' flagged' : ''),
      style: {transform:'translateX('+swipeX+'px)', transition: swipeX===0 ? 'transform .25s ease' : 'none'},
      onTouchStart:onTS, onTouchMove:onTM, onTouchEnd:onTE
    },
      h('div', {className:'task-check', onClick:props.onToggle, style:{cursor:'pointer'}}),
      h('div', {className:'task-body'},
        h('div', {className:'task-text', onClick:props.onToggle, style:{cursor:'pointer'}}, task.name),
        h('div', {className:'task-acts'},
          h('button', {
            className: 'flag-btn' + (ts.flagged ? ' active' : ''),
            title: ts.flagged ? 'Remove priority' : 'Mark priority',
            onClick: function(e){e.stopPropagation(); props.onFlag();}
          }, ts.flagged ? '! Priority' : 'Flag'),
          h('button', {className:'task-btn', onClick:function(e){e.stopPropagation();setShowNote(function(v){return !v;})}},
            ts.note ? 'Note' : '+ Note'),
          h('button', {className:'task-btn', onClick:function(e){e.stopPropagation();camRef.current&&camRef.current.click();}}, 'Camera'),
          h('button', {className:'task-btn', onClick:function(e){e.stopPropagation();fileRef.current&&fileRef.current.click();}}, 'Gallery')
        ),
        showNote ? h('textarea', {className:'note-inp', placeholder:'Field note...', value:ts.note||'',
          onClick:function(e){e.stopPropagation();},
          onChange:function(e){props.onNote(e.target.value);}}) : null,
        (ts.photos||[]).length > 0 ? h('div', {className:'photo-row'},
          (ts.photos||[]).map(function(src,i){
            return h('div', {key:i, className:'photo-del-wrap'},
              h('img', {src:src, className:'photo-thumb', alt:''}),
              h('button', {className:'photo-del', onClick:function(e){e.stopPropagation();props.onDelPhoto(i);}}, 'x')
            );
          })
        ) : null
      )
    ),
    h('input', {ref:camRef, type:'file', accept:'image/*', capture:'environment', style:{display:'none'},
      onChange:function(e){if(e.target.files[0])addPhoto(e.target.files[0]);e.target.value=''}}),
    h('input', {ref:fileRef, type:'file', accept:'image/*', style:{display:'none'},
      onChange:function(e){if(e.target.files[0])addPhoto(e.target.files[0]);e.target.value=''}})
  );
}

// ---- MODULE VIEW ----
function ModuleView(props) {
  var proj = props.proj;
  var modIdx = props.modIdx;
  var mod = MODULES[modIdx];
  var ts = proj.taskState || {};
  var scState = useState(false); var showCompleted = scState[0]; var setShowCompleted = scState[1];
  var sdState = useState(false); var showDismissed = sdState[0]; var setShowDismissed = sdState[1];
  var saState = useState(false); var showAddTask = saState[0]; var setShowAddTask = saState[1];
  var ntState = useState(''); var newTaskName = ntState[0]; var setNewTaskName = ntState[1];

  var baseTasks = buildTasks(mod, proj.numFloors);
  var custom = (proj.customTasks && proj.customTasks[mod.id]) || [];
  var allTasks = baseTasks.concat(custom);

  var flagged = allTasks.filter(function(t){ return !ts[t.id]||!ts[t.id].dismissed&&!ts[t.id].checked; }).filter(function(t){return ts[t.id]&&ts[t.id].flagged;});
  var active = allTasks.filter(function(t){ return (!ts[t.id]||(!ts[t.id].dismissed&&!ts[t.id].checked&&!ts[t.id].flagged)); });
  var completed = allTasks.filter(function(t){ return ts[t.id]&&ts[t.id].checked&&!ts[t.id].dismissed; });
  var dismissed = allTasks.filter(function(t){ return ts[t.id]&&ts[t.id].dismissed; });

  var oPct = overallPct(proj);
  var totalActive = flagged.length + active.length;
  var doneCount = completed.length;
  var totalCount = totalActive + doneCount + dismissed.length;
  var pct = totalCount ? Math.round(doneCount / (totalActive + doneCount) * 100) : 100;

  function upd(taskId, patch) {
    var cur = ts[taskId] || {};
    var newTs = Object.assign({}, ts);
    newTs[taskId] = Object.assign({}, cur, patch);
    props.onUpdate({taskState: newTs});
  }

  function handleCheck(taskId) {
    var cur = ts[taskId] || {};
    var nowChecked = !cur.checked;
    upd(taskId, {checked: nowChecked, completedDate: nowChecked ? new Date().toISOString() : null, flagged: false});
  }

  function handleAddTask() {
    var name = newTaskName.trim();
    if (!name) return;
    var id = mod.id + '__custom__' + Date.now();
    var existing = (proj.customTasks && proj.customTasks[mod.id]) || [];
    var newCustom = Object.assign({}, proj.customTasks || {});
    newCustom[mod.id] = existing.concat([{id:id, name:name, custom:true}]);
    props.onUpdate({customTasks: newCustom});
    setNewTaskName('');
    setShowAddTask(false);
  }

  function renderTask(task) {
    return h(Task, {
      key: task.id,
      task: task,
      ts: ts[task.id],
      onToggle: function(){ handleCheck(task.id); },
      onDismiss: function(){ upd(task.id, {dismissed:true, flagged:false}); },
      onFlag: function(){ upd(task.id, {flagged:!(ts[task.id]&&ts[task.id].flagged)}); },
      onNote: function(val){ upd(task.id, {note:val}); },
      onPhoto: function(src){
        var existing = (ts[task.id]&&ts[task.id].photos)||[];
        upd(task.id, {photos:existing.concat([src])});
      },
      onDelPhoto: function(idx){
        var existing = (ts[task.id]&&ts[task.id].photos)||[];
        upd(task.id, {photos:existing.filter(function(_,j){return j!==idx;})});
      }
    });
  }

  function handleDownload() {
    var jsPDF = window.jspdf.jsPDF;
    var zip = new JSZip();
    var doc = new jsPDF({unit:'pt', format:'letter'});
    var W = doc.internal.pageSize.getWidth();
    var y = 50;
    function newPage(){ doc.addPage(); y=50; }
    function chk(n){ if(y+(n||25)>730) newPage(); }

    doc.setFillColor(15,14,12); doc.rect(0,0,W,792,'F');
    doc.setTextColor(200,169,110); doc.setFontSize(22); doc.setFont('helvetica','bold');
    doc.text('ELEVATOR MODERNIZATION', W/2, 110, {align:'center'});
    doc.setFontSize(13); doc.setFont('helvetica','normal');
    doc.text('Project Report', W/2, 135, {align:'center'});
    var info=[
      ['Building', proj.buildingName],
      ['Job No.', proj.jobNumber],
      ['Key No.', proj.keyNumber||''],
      ['Address', (proj.street||'')+', '+(proj.city||'')],
      ['Tech', proj.techName],
      ['Start Date', proj.startDate],
      ['Progress', oPct+'%'],
      ['Generated', new Date().toLocaleDateString()]
    ];
    info.forEach(function(row,i){
      doc.setTextColor(122,106,80); doc.setFontSize(10); doc.text(row[0]+':', 70, 210+i*22);
      doc.setTextColor(200,184,152); doc.text(String(row[1]||''), 185, 210+i*22);
    });

    MODULES.forEach(function(m){
      doc.addPage(); y=50;
      doc.setFillColor(26,24,20); doc.rect(0,0,W,792,'F');
      doc.setTextColor(200,169,110); doc.setFontSize(14); doc.setFont('helvetica','bold');
      doc.text(m.label.toUpperCase(), 50, y); y+=26;
      var mBase = buildTasks(m, proj.numFloors);
      var mCustom = (proj.customTasks&&proj.customTasks[m.id])||[];
      var mAll = mBase.concat(mCustom);
      var mActive = mAll.filter(function(t){return !ts[t.id]||!ts[t.id].dismissed;});
      var mDone = mActive.filter(function(t){return ts[t.id]&&ts[t.id].checked;}).length;
      doc.setFontSize(8); doc.setTextColor(122,106,80); doc.setFont('helvetica','normal');
      doc.text(mDone+'/'+mActive.length+' tasks complete', 50, y); y+=16;
      mAll.forEach(function(task){
        var s=ts[task.id]||{};
        if(s.dismissed) return;
        chk(18);
        doc.setFontSize(9);
        if(s.checked){ doc.setTextColor(90,160,90); }
        else if(s.flagged){ doc.setTextColor(200,140,60); }
        else{ doc.setTextColor(200,184,152); }
        var prefix = s.checked ? '[x] ' : (s.flagged ? '[!] ' : '[ ] ');
        var suffix = s.checked&&s.completedDate ? '  ('+fmtDate(s.completedDate)+')' : '';
        doc.text(prefix+task.name+suffix+(task.custom?' [custom]':''), 50, y); y+=15;
        if(s.note){
          chk(13); doc.setFontSize(8); doc.setTextColor(122,106,80);
          var lines=doc.splitTextToSize('  Note: '+s.note, W-100);
          doc.text(lines, 60, y); y+=lines.length*11;
        }
        if(s.photos&&s.photos.length){
          s.photos.forEach(function(src,pi){
            chk(75);
            try{
              doc.addImage(src,'JPEG',60,y,75,56);
              zip.file(m.id+'/'+task.id.replace(/[^a-z0-9_]/gi,'_')+'_photo'+(pi+1)+'.jpg', src.split(',')[1],{base64:true});
              y+=63;
            }catch(e){}
          });
        }
      });
    });

    zip.file('report.pdf', doc.output('blob'));
    zip.generateAsync({type:'blob'}).then(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url; a.download=(proj.jobNumber||'project').replace(/\s+/g,'_')+'_report.zip';
      a.click(); URL.revokeObjectURL(url);
    });
  }

  return h('div', {className:'screen'},
    h('div', {className:'hdr'},
      h('div', {className:'hdr-row'},
        h('div', null,
          h('button', {className:'back-btn', onClick:props.onBack}, 'Back to Projects'),
          h('div', {style:{fontSize:'0.7rem',color:'#7a6a50',marginTop:2,fontStyle:'italic'}},
            proj.buildingName + ' - ' + proj.jobNumber + (proj.keyNumber ? ' - Key: '+proj.keyNumber : ''))
        ),
        h('button', {className:'dl-btn', onClick:handleDownload}, 'Download ZIP')
      ),
      h('div', {className:'pbar-wrap', style:{marginTop:8}},
        h('div', {className:'pbar-fill', style:{width:oPct+'%'}})
      ),
      h('div', {className:'pbar-lbl'}, 'Overall: '+oPct+'% complete')
    ),
    h('div', {className:'mod-tabs'},
      MODULES.map(function(m,i){
        var mp=modPct(m,proj);
        return h('button', {key:m.id, className:'mod-tab'+(modIdx===i?' active':'')+(mp===100?' complete':''), onClick:function(){props.setModIdx(i);}},
          h('span', {className:'t-lbl'}, m.label),
          h('span', {className:'t-dot'})
        );
      })
    ),
    h('div', {className:'scroll'},
      h('div', {className:'task-section'},
        h('div', {className:'mod-hdr'},
          h('div', {className:'mod-tag'}, mod.label),
          h('div', {className:'mod-title'}, mod.label),
          h('div', {className:'mod-prog'}, doneCount+' of '+(totalActive+doneCount)+' tasks complete - '+pct+'%'+(flagged.length?' - '+flagged.length+' flagged':''))
        ),

        // Flagged tasks
        flagged.length > 0 ? h('div', {style:{marginBottom:8}},
          h('div', {style:{fontSize:'0.62rem',color:'#c8a06e',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4,paddingLeft:2}}, '! Priority'),
          flagged.map(function(task,i){
            return h('div', {key:task.id},
              renderTask(task),
              i<flagged.length-1 ? h('div',{className:'divider'}) : null
            );
          })
        ) : null,

        // Active tasks
        active.length > 0 ? h('div', null,
          flagged.length > 0 ? h('div', {style:{fontSize:'0.62rem',color:'#7a6a50',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4,paddingLeft:2,marginTop:12}}, 'Active') : null,
          active.map(function(task,i){
            return h('div', {key:task.id},
              renderTask(task),
              i<active.length-1 ? h('div',{className:'divider'}) : null
            );
          })
        ) : null,

        // Completed section
        completed.length > 0 ? h('div', null,
          h('button', {className:'section-toggle completed', onClick:function(){setShowCompleted(function(v){return !v;})}},
            h('span', null, (showCompleted ? 'Hide' : 'Show') + ' Completed (' + completed.length + ')'),
            h('span', null, showCompleted ? 'v' : '>')
          ),
          showCompleted ? completed.map(function(task){
            return h('div', {key:task.id, className:'completed-item'},
              h('button', {className:'completed-check', onClick:function(){handleCheck(task.id);}, title:'Mark incomplete'},
                h('svg', {width:11,height:11,viewBox:'0 0 14 14',style:{stroke:'#4a9a4a',fill:'none',strokeWidth:2.5}},
                  h('polyline', {points:'2,7 6,11 12,3'})
                )
              ),
              h('div', {className:'completed-body'},
                h('div', {className:'completed-text'}, task.name+(task.custom?' *':'')),
                h('div', {className:'completed-date'}, 'Completed: '+fmtDate(ts[task.id]&&ts[task.id].completedDate)),
                ts[task.id]&&ts[task.id].note ? h('div', {className:'completed-note'}, 'Note: '+ts[task.id].note) : null
              )
            );
          }) : null
        ) : null,

        // Dismissed section
        dismissed.length > 0 ? h('div', null,
          h('button', {className:'section-toggle dismissed', onClick:function(){setShowDismissed(function(v){return !v;})}},
            h('span', null, (showDismissed ? 'Hide' : 'Show') + ' Dismissed (' + dismissed.length + ')'),
            h('span', null, showDismissed ? 'v' : '>')
          ),
          showDismissed ? dismissed.map(function(task){
            return h('div', {key:task.id, className:'dismissed-item'},
              h('span', {className:'dismissed-text'}, task.name),
              h('button', {className:'restore-btn', onClick:function(){upd(task.id,{dismissed:false});}}, 'Restore')
            );
          }) : null
        ) : null,

        // Add custom task
        h('div', {className:'add-task-wrap'},
          !showAddTask ? h('button', {className:'add-task-btn', onClick:function(){setShowAddTask(true);}}, '+ Add Task') : null,
          showAddTask ? h('div', {className:'add-task-form'},
            h('input', {className:'add-task-inp', placeholder:'Task name...', value:newTaskName, autoFocus:true,
              onChange:function(e){setNewTaskName(e.target.value);},
              onKeyDown:function(e){if(e.key==='Enter')handleAddTask();if(e.key==='Escape'){setShowAddTask(false);setNewTaskName('');}}}),
            h('div', {className:'add-task-btns'},
              h('button', {className:'add-task-save', onClick:handleAddTask}, 'Add Task'),
              h('button', {className:'add-task-cancel', onClick:function(){setShowAddTask(false);setNewTaskName('');}}, 'Cancel')
            )
          ) : null
        )
      )
    ),
    h('div', {className:'bot-nav'},
      h('button', {className:'nav-btn', disabled:modIdx===0, onClick:function(){props.setModIdx(function(i){return i-1;});}}, 'Prev'),
      h('span', {className:'nav-ctr'}, (modIdx+1)+' / '+MODULES.length),
      h('button', {className:'nav-btn', disabled:modIdx===MODULES.length-1, onClick:function(){props.setModIdx(function(i){return i+1;});}}, 'Next')
    )
  );
}

// ---- NEW PROJECT FORM ----
function NewProject(props) {
  var fState = useState({buildingName:'',jobNumber:'',keyNumber:'',street:'',city:'',startDate:new Date().toISOString().split('T')[0],techName:'',numFloors:'2'});
  var f = fState[0]; var setF = fState[1];
  function set(k,v){ setF(function(p){var n=Object.assign({},p);n[k]=v;return n;}); }
  var valid = f.buildingName.trim() && f.jobNumber.trim();

  function inp(label, key, type, placeholder){
    return h('div', null,
      h('label', {className:'form-lbl'}, label),
      h('input', {className:'form-inp', type:type||'text', placeholder:placeholder||'', value:f[key], onChange:function(e){set(key,e.target.value);}})
    );
  }

  return h('div', {className:'screen'},
    h('div', {className:'hdr'},
      h('div', {className:'hdr-row'},
        h('div', {className:'hdr-title'}, 'New Project'),
        h('button', {className:'back-btn', onClick:props.onCancel}, 'Cancel')
      )
    ),
    h('div', {className:'scroll'},
      h('div', {className:'form-wrap'},
        h('div', {className:'form-card'},
          h('div', {className:'form-row'}, inp('Building Name *','buildingName','text','e.g. Harbour Centre')),
          h('div', {className:'form-row-2'},
            inp('Job Number *','jobNumber','text','e.g. EL-2024-047'),
            inp('Key Number','keyNumber','text','e.g. K-042')
          ),
          h('div', {className:'form-row'}, inp('Street Address','street','text','123 Main Street')),
          h('div', {className:'form-row-2'},
            inp('City','city','text','Victoria'),
            inp('Number of Floors','numFloors','number','2')
          ),
          h('div', {className:'form-row-2'},
            inp('Start Date','startDate','date',''),
            inp('Tech Name','techName','text','Your name')
          ),
          h('button', {className:'btn-primary', style:{opacity:valid?1:0.4}, disabled:!valid,
            onClick:function(){props.onSave(Object.assign({},f,{id:Date.now().toString(),taskState:{},customTasks:{},createdAt:new Date().toISOString()}));}
          }, 'Create Project'),
          h('button', {className:'btn-secondary', onClick:props.onCancel}, 'Cancel')
        )
      )
    )
  );
}

// ---- DASHBOARD ----
function Dashboard(props) {
  var cState = useState(null); var confirmId = cState[0]; var setConfirmId = cState[1];

  return h('div', {className:'screen'},
    h('div', {className:'hdr'},
      h('div', {className:'hdr-title'}, 'Elevator Pro'),
      h('div', {className:'hdr-sub'}, 'Modernization Checklist')
    ),
    h('div', {className:'scroll'},
      h('div', {className:'proj-list'},
        h('button', {className:'btn-primary', onClick:props.onCreate}, '+ New Project'),
        props.projects.length===0 ? h('div', {className:'empty-state'}, 'No projects yet. Tap New Project to get started.') : null,
        props.projects.map(function(proj){
          var pct=overallPct(proj);
          return h('div', {key:proj.id, className:'proj-card', onClick:function(){props.onOpen(proj.id);}},
            h('div', {className:'proj-card-top'},
              h('div', null,
                h('div', {className:'proj-name'}, proj.buildingName),
                h('div', {className:'proj-meta'}, proj.jobNumber+(proj.keyNumber?' - Key: '+proj.keyNumber:'')+' - '+(proj.city||'')+' - '+(proj.numFloors||'')+' floors'),
                h('div', {className:'proj-meta'}, (proj.techName||'')+' - Started '+(proj.startDate||''))
              ),
              h('div', {className:'proj-pct'}, pct+'%')
            ),
            h('div', {className:'proj-pbar'}, h('div', {className:'proj-pbar-fill', style:{width:pct+'%'}})),
            h('div', {className:'proj-btns', onClick:function(e){e.stopPropagation();}},
              h('button', {className:'btn-sm btn-gold', onClick:function(){props.onOpen(proj.id);}}, 'Open'),
              h('button', {className:'btn-sm btn-danger', onClick:function(){setConfirmId(proj.id);}}, 'Delete')
            )
          );
        })
      )
    ),
    confirmId ? h('div', {className:'modal-ov'},
      h('div', {className:'modal-box'},
        h('div', {className:'modal-title'}, 'Delete Project?'),
        h('div', {className:'modal-text'}, 'This will permanently delete the project and all its data. This cannot be undone.'),
        h('div', {className:'modal-btns'},
          h('button', {className:'modal-cancel', onClick:function(){setConfirmId(null);}}, 'Cancel'),
          h('button', {className:'modal-confirm', onClick:function(){props.onDelete(confirmId);setConfirmId(null);}}, 'Delete')
        )
      )
    ) : null
  );
}

// ---- APP ROOT ----
function App() {
  var pState = useState(loadAll); var projects = pState[0]; var setProjects = pState[1];
  var vState = useState('dashboard'); var view = vState[0]; var setView = vState[1];
  var aState = useState(null); var activeId = aState[0]; var setActiveId = aState[1];
  var mState = useState(0); var modIdx = mState[0]; var setModIdx = mState[1];

  function save(p){ setProjects(p); saveAll(p); }
  var activeProj = projects.filter(function(p){return p.id===activeId;})[0];

  if(view==='new') return h(NewProject,{
    onSave:function(proj){save([proj].concat(projects));setActiveId(proj.id);setModIdx(0);setView('project');},
    onCancel:function(){setView('dashboard');}
  });
  if(view==='project'&&activeProj) return h(ModuleView,{
    proj:activeProj, modIdx:modIdx, setModIdx:setModIdx,
    onUpdate:function(patch){save(projects.map(function(p){return p.id===activeId?Object.assign({},p,patch):p;}));},
    onBack:function(){setView('dashboard');}
  });
  return h(Dashboard,{
    projects:projects,
    onOpen:function(id){setActiveId(id);setModIdx(0);setView('project');},
    onCreate:function(){setView('new');},
    onDelete:function(id){save(projects.filter(function(p){return p.id!==id;}));}
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
})();
</script>
