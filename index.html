<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#008080"/>
<title>Elevator Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden}
body{background:#008080;font-family:Arial,sans-serif;font-size:13px;color:#000}
::-webkit-scrollbar{width:16px;background:#c0c0c0}
::-webkit-scrollbar-track{background:#c0c0c0;border-left:1px solid #808080}
::-webkit-scrollbar-thumb{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080}

/* WIN95 PRIMITIVES */
.win-raised{border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080}
.win-sunken{border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff}
.win-inset{border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff}
.win-outset{border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:#c0c0c0;overflow:hidden}

/* TITLE BAR */
.titlebar{background:linear-gradient(90deg,#000080,#1084d0);padding:3px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:calc(3px + env(safe-area-inset-top))}
.titlebar-text{color:#fff;font-weight:bold;font-size:12px;letter-spacing:0}
.titlebar-sub{color:#c0d8f0;font-size:10px;margin-top:1px}

/* MENU BAR */
.menubar{background:#c0c0c0;border-bottom:1px solid #808080;padding:2px 4px;display:flex;gap:0;flex-shrink:0}
.menu-item{padding:3px 8px;font-size:12px;cursor:pointer;border:1px solid transparent}
.menu-item:active{border:1px solid #808080;background:#c0c0c0}

/* PROGRESS */
.progress-wrap{background:#c0c0c0;padding:4px 6px;border-bottom:1px solid #808080;flex-shrink:0}
.progress-bar-outer{height:16px;background:#fff;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;padding:1px}
.progress-bar-inner{height:100%;background:#000080;display:flex;align-items:center;justify-content:center;transition:width 0.3s}
.progress-label{font-size:10px;color:#fff;font-weight:bold;white-space:nowrap;padding:0 4px}
.progress-text{font-size:10px;color:#000;margin-top:2px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#c0c0c0}

/* WINDOW PANEL */
.win-panel{background:#c0c0c0;margin:6px;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:8px}

/* BUTTONS */
.btn95{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:4px 12px;font-size:12px;cursor:pointer;min-height:28px;font-family:Arial,sans-serif;color:#000;white-space:nowrap}
.btn95:active{border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;padding:5px 11px 3px 13px}
.btn95:disabled{color:#808080;cursor:default}
.btn95.primary{min-width:100%;padding:6px 12px;font-weight:bold}
.btn95.danger{color:#800000}
.btn95.small{padding:2px 8px;min-height:22px;font-size:11px}
.btn95.full{width:100%;text-align:center}

/* PROJECT CARDS */
.proj-list{padding:6px;display:flex;flex-direction:column;gap:6px}
.proj-card{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:8px;cursor:pointer}
.proj-card:active{border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff}
.proj-title-bar{background:linear-gradient(90deg,#000080,#1084d0);padding:3px 6px;margin:-8px -8px 8px -8px;display:flex;justify-content:space-between;align-items:center}
.proj-title-text{color:#fff;font-weight:bold;font-size:12px}
.proj-pct-text{color:#fff;font-size:11px}
.proj-meta{font-size:11px;color:#000;margin-top:3px}
.proj-pbar-outer{height:14px;background:#fff;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;margin-top:5px;padding:1px}
.proj-pbar-inner{height:100%;background:#000080;transition:width .3s}
.proj-btns{display:flex;gap:6px;margin-top:8px}
.empty-state{text-align:center;padding:40px 20px;color:#000;font-size:12px}

/* FORM */
.form-wrap{padding:6px}
.form-section{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:10px}
.form-row{margin-bottom:10px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.form-lbl{display:block;font-size:12px;font-weight:bold;margin-bottom:3px;color:#000}
.form-inp{width:100%;background:#fff;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;padding:4px 6px;font-size:12px;font-family:Arial,sans-serif;outline:none;color:#000}
.form-inp:focus{outline:1px dotted #000;outline-offset:-2px}

/* MODULE TABS */
.tab-bar{display:flex;overflow-x:auto;background:#c0c0c0;border-bottom:2px solid #808080;flex-shrink:0;scrollbar-width:none;padding:4px 4px 0 4px;gap:2px}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:4px 10px;font-size:11px;font-family:Arial,sans-serif;cursor:pointer;background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:none;color:#000;white-space:nowrap;min-height:26px;position:relative;bottom:-2px}
.tab-btn.active{background:#c0c0c0;border-bottom:2px solid #c0c0c0;z-index:2;font-weight:bold;padding-bottom:6px}
.tab-btn.complete{color:#000080;font-weight:bold}

/* TASK AREA */
.task-area{padding:6px;padding-bottom:80px}
.mod-header{background:linear-gradient(90deg,#000080,#1084d0);padding:3px 6px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.mod-header-text{color:#fff;font-weight:bold;font-size:12px}
.mod-header-prog{color:#c0d8f0;font-size:11px}

/* TASK ITEMS */
.task-wrap{position:relative;margin-bottom:3px;overflow:hidden}
.task-dismiss-bg{position:absolute;inset:0;background:#800000;display:flex;align-items:center;justify-content:flex-end;padding-right:14px;font-size:11px;color:#fff;font-weight:bold}
.task-item{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:5px 7px;display:flex;align-items:flex-start;gap:8px;position:relative;touch-action:pan-y;-webkit-user-select:none;user-select:none}
.task-item.flagged{background:#fff0f0;border-top-color:#ff0000;border-left-color:#ff0000}
.win-checkbox{width:13px;height:13px;min-width:13px;background:#fff;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;display:flex;align-items:center;justify-content:center;margin-top:2px;cursor:pointer;flex-shrink:0}
.win-checkbox.checked{background:#fff}
.chk-mark{font-size:10px;line-height:1;color:#000;font-weight:bold}
.task-body{flex:1;min-width:0}
.task-text{font-size:12px;color:#000;line-height:1.4;cursor:default}
.task-text.flagged{color:#800000;font-weight:bold}
.task-acts{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
.flag-btn-inactive{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;width:22px;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#808080}
.flag-btn-active{background:#c0c0c0;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;width:22px;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#ff0000}
.note-inp{width:100%;margin-top:4px;background:#fff;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;padding:4px 6px;font-size:11px;font-family:Arial,sans-serif;resize:none;min-height:50px;outline:none;color:#000}
.photo-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.photo-thumb{width:48px;height:48px;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;object-fit:cover}
.photo-del-wrap{position:relative}
.photo-del{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:#c0c0c0;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080;color:#000;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold}

/* SECTION HEADERS */
.section-hdr{background:#000080;color:#fff;font-size:11px;font-weight:bold;padding:2px 6px;margin-top:8px;margin-bottom:3px;display:flex;justify-content:space-between;cursor:pointer}
.section-hdr.green{background:#006400}
.section-hdr.red{background:#800000}

/* COMPLETED TASKS */
.completed-item{background:#f0fff0;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;padding:5px 7px;margin-bottom:2px;display:flex;align-items:flex-start;gap:8px}
.completed-check{width:13px;height:13px;min-width:13px;background:#fff;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;display:flex;align-items:center;justify-content:center;margin-top:2px;cursor:pointer;flex-shrink:0}
.completed-text{font-size:12px;color:#006400;text-decoration:line-through}
.completed-date{font-size:10px;color:#808080;margin-top:2px}
.completed-note{font-size:10px;color:#006400;margin-top:2px;font-style:italic}

/* DISMISSED */
.dismissed-item{background:#fff0f0;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;padding:5px 7px;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between}
.dismissed-text{font-size:11px;color:#808080;font-style:italic}

/* ADD TASK */
.add-task-wrap{margin-top:8px}
.add-task-form{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:8px}
.add-task-inp{width:100%;background:#fff;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;padding:4px 6px;font-size:12px;font-family:Arial,sans-serif;outline:none;margin-bottom:6px;color:#000}
.add-task-btns{display:flex;gap:6px;justify-content:flex-end}

/* BOTTOM NAV */
.bot-nav{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;border-top:2px solid #fff;background:#c0c0c0;flex-shrink:0;padding-bottom:calc(4px + env(safe-area-inset-bottom))}
.nav-ctr{font-size:11px;color:#000}

/* STATUS BAR */
.statusbar{background:#c0c0c0;border-top:2px solid #808080;padding:2px 6px;font-size:10px;color:#000;flex-shrink:0;display:flex;gap:12px;padding-bottom:calc(2px + env(safe-area-inset-bottom))}
.status-cell{border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;padding:1px 6px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-win{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;width:100%;max-width:300px}
.modal-titlebar{background:linear-gradient(90deg,#000080,#1084d0);padding:3px 6px;display:flex;justify-content:space-between;align-items:center}
.modal-title-text{color:#fff;font-weight:bold;font-size:12px}
.modal-body{padding:16px}
.modal-msg{font-size:12px;margin-bottom:14px;line-height:1.5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}

.dl-btn{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:3px 10px;font-size:11px;cursor:pointer;font-family:Arial,sans-serif;color:#000}
.dl-btn:active{border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff}
.back-btn{background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:3px 10px;font-size:11px;cursor:pointer;font-family:Arial,sans-serif;color:#000}
.back-btn:active{border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(function() {
'use strict';
var h = React.createElement;
var useState = React.useState;
var useRef = React.useRef;

var MODULES = [
  {id:'survey', label:'Site Survey', perFloor:[], tasks:['Hoistway wire','Pit channel','Travel cable','Telephone','Scope','Photos','Piston layout','Seismic plates','Contacts','Scanning','Cab drawings','Fixtures','Jack build sheet','Site Survey sheet','Controller prints']},
  {id:'machineroom', label:'Machine Room', perFloor:[], tasks:['Smoke detectors covered','Lighting','Main disconnect','110V disconnect','GFCI plug','Old controller removed','Hydro tank replacement','Hydro pump wired','Hoistway wire run','Piping to controller from hoistway','Oil line run','Paint floor','Isolation coupler','Muffler','Controller prints','Controller manual','Old maintenance logs']},
  {id:'hoistway', label:'Hoistway', perFloor:['Door locks installed','Spirators','Relating cables','Brackets pinned','Hall door rollers','Door pickups','Lunar key access','Door rollers','Vein plates','Floor zone switches','Floor label stencils'], tasks:['Smoke detectors covered','Measurements for wire','Door locks installed','Spirators','Relating cables','Brackets pinned','Travelers hung','Hoistway wire run','Upper limit','Lower limit','Hall door rollers','Anti-snag','Access switch','Door pickups','Lunar key access','Door rollers','Toe guard','Remove old hoistway wire','Remove old travelers','Vein plates','Floor zone switches','Floor label stencils']},
  {id:'carexterior', label:'Car Exterior', perFloor:[], tasks:['Old equipment dismantled','Guard rails','Kick plates','Door operator','Inspection station','Fan','Light box','Gate switch','Car door restrictor','Guide shoes','Seismic plates','Landing system','Cam','Troughing','Flex to COP','Leveling system','Door clutch','Light curtain','Light curtain controller','Hatch plug','Toe guard','Data tags']},
  {id:'carinterior', label:'Car Interior', perFloor:[], tasks:['Cab door removed','Measurements','Car door rollers','COP cut','Door jamb arrows','Hand rails','Toe guard','Remove COP','Dismantle cab','Remove floors','Reclad interior','Install wall panels','Install ceiling','Pad pins','Remove stainless protection','Cab door reinstalled','Install COP','TSBC plate']},
  {id:'pit', label:'Pit', perFloor:[], tasks:['Lighting','Stop switch','Buffers','Jack removed','GFCI switch','Flood switch','PVC sheath installed','Jack installed','Pit channel','Ladder']},
  {id:'hallways', label:'Hallways', perFloor:['Hall call buttons','Pickup indicators','Floor protection','Braille','Lighting sufficient'], tasks:['Hall call buttons','Pickup indicators','Door jambs reclad','Fire panel installed','Floor protection','Braille','Lighting sufficient']},
  {id:'building', label:'Building', perFloor:[], tasks:['Machine room door','Phone line','Machine room empty','Hallway lighting','Fire extinguisher','Ventilation requirements']}
];

function buildTasks(mod, numFloors) {
  var n = Math.max(1, parseInt(numFloors) || 1);
  var out = [];
  mod.tasks.forEach(function(name) {
    if (mod.perFloor.indexOf(name) >= 0) {
      for (var f = 1; f <= n; f++) {
        out.push({id: mod.id+'__'+name.replace(/\s+/g,'_')+'__f'+f, name: name+' -- Floor '+f, custom:false});
      }
    } else {
      out.push({id: mod.id+'__'+name.replace(/\s+/g,'_'), name: name, custom:false});
    }
  });
  return out;
}

function overallPct(proj) {
  var ts = proj.taskState || {};
  var total = 0, done = 0;
  MODULES.forEach(function(m) {
    buildTasks(m, proj.numFloors).forEach(function(t) {
      if (!ts[t.id] || !ts[t.id].dismissed) { total++; if (ts[t.id] && ts[t.id].checked) done++; }
    });
    var custom = (proj.customTasks && proj.customTasks[m.id]) || [];
    custom.forEach(function(t) {
      if (!ts[t.id] || !ts[t.id].dismissed) { total++; if (ts[t.id] && ts[t.id].checked) done++; }
    });
  });
  return total ? Math.round(done / total * 100) : 0;
}

function modPct(mod, proj) {
  var ts = proj.taskState || {};
  var all = buildTasks(mod, proj.numFloors).concat((proj.customTasks && proj.customTasks[mod.id]) || []);
  var active = all.filter(function(t) { return !ts[t.id] || !ts[t.id].dismissed; });
  if (!active.length) return 100;
  return Math.round(active.filter(function(t) { return ts[t.id] && ts[t.id].checked; }).length / active.length * 100);
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-CA', {year:'numeric', month:'short', day:'numeric'});
}

function saveAll(p) { try { localStorage.setItem('elevpro_v4', JSON.stringify(p)); } catch(e) {} }
function loadAll() { try { return JSON.parse(localStorage.getItem('elevpro_v4') || '[]'); } catch(e) { return []; } }

// ---- FLAG ICON SVG ----
function FlagIcon(props) {
  return h('svg', {width:12, height:14, viewBox:'0 0 12 14', style:{display:'block'}},
    h('path', {d:'M1 1 L1 13 M1 1 L9 3 L1 6', stroke: props.active ? '#ff0000' : '#808080', strokeWidth:2, fill: props.active ? '#ff0000' : 'none', strokeLinejoin:'round', strokeLinecap:'round'})
  );
}

// ---- TASK COMPONENT ----
function Task(props) {
  var task = props.task;
  var ts = props.ts || {};
  var swState = useState(0); var swipeX = swState[0]; var setSwipeX = swState[1];
  var snState = useState(false); var showNote = snState[0]; var setShowNote = snState[1];
  var startX = useRef(null);
  var photoRef = useRef(null);

  function onTS(e) { startX.current = e.touches[0].clientX; }
  function onTM(e) {
    if (startX.current === null) return;
    var dx = e.touches[0].clientX - startX.current;
    if (dx < 0) setSwipeX(Math.max(dx, -80));
  }
  function onTE() {
    if (swipeX < -55) props.onDismiss();
    setSwipeX(0); startX.current = null;
  }
  function addPhoto(file) {
    var r = new FileReader();
    r.onload = function(e) { props.onPhoto(e.target.result); };
    r.readAsDataURL(file);
  }

  return h('div', {className:'task-wrap'},
    h('div', {className:'task-dismiss-bg'}, 'DISMISS'),
    h('div', {
      className: 'task-item' + (ts.flagged ? ' flagged' : ''),
      style: {transform:'translateX('+swipeX+'px)', transition: swipeX===0 ? 'transform .2s ease' : 'none'},
      onTouchStart:onTS, onTouchMove:onTM, onTouchEnd:onTE
    },
      h('div', {
        className: 'win-checkbox' + (ts.checked ? ' checked' : ''),
        onClick: function(e) { e.stopPropagation(); props.onToggle(); }
      },
        ts.checked ? h('span', {className:'chk-mark'}, 'x') : null
      ),
      h('div', {className:'task-body'},
        h('div', {className:'task-text' + (ts.flagged ? ' flagged' : '')}, task.name+(task.custom?' *':'')),
        h('div', {className:'task-acts'},
          h('button', {
            className: ts.flagged ? 'flag-btn-active' : 'flag-btn-inactive',
            onClick: function(e) { e.stopPropagation(); props.onFlag(); },
            title: ts.flagged ? 'Remove flag' : 'Flag as priority'
          }, h(FlagIcon, {active: ts.flagged})),
          h('button', {className:'btn95 small', onClick:function(e){e.stopPropagation();setShowNote(function(v){return !v;});}},
            ts.note ? 'Note *' : 'Note'),
          h('button', {className:'btn95 small', onClick:function(e){e.stopPropagation();photoRef.current&&photoRef.current.click();}}, 'Photo'),
          (ts.photos||[]).length > 0 ? h('span', {style:{fontSize:'10px',color:'#808080'}}, (ts.photos.length)+' photo'+(ts.photos.length>1?'s':'')) : null
        ),
        showNote ? h('textarea', {
          className:'note-inp', placeholder:'Field note...',
          value: ts.note||'',
          onClick: function(e){e.stopPropagation();},
          onChange: function(e){props.onNote(e.target.value);}
        }) : null,
        (ts.photos||[]).length > 0 ? h('div', {className:'photo-row'},
          (ts.photos||[]).map(function(src,i){
            return h('div', {key:i, className:'photo-del-wrap'},
              h('img', {src:src, className:'photo-thumb', alt:''}),
              h('button', {className:'photo-del', onClick:function(e){e.stopPropagation();props.onDelPhoto(i);}}, 'x')
            );
          })
        ) : null
      )
    ),
    h('input', {ref:photoRef, type:'file', accept:'image/*', style:{display:'none'},
      onChange:function(e){if(e.target.files[0])addPhoto(e.target.files[0]);e.target.value='';}})
  );
}

// ---- MODULE VIEW ----
function ModuleView(props) {
  var proj = props.proj;
  var modIdx = props.modIdx;
  var mod = MODULES[modIdx];
  var ts = proj.taskState || {};
  var scState = useState(false); var showCompleted = scState[0]; var setShowCompleted = scState[1];
  var sdState = useState(false); var showDismissed = sdState[0]; var setShowDismissed = sdState[1];
  var saState = useState(false); var showAddTask = saState[0]; var setShowAddTask = saState[1];
  var ntState = useState(''); var newTaskName = ntState[0]; var setNewTaskName = ntState[1];

  var baseTasks = buildTasks(mod, proj.numFloors);
  var custom = (proj.customTasks && proj.customTasks[mod.id]) || [];
  var allTasks = baseTasks.concat(custom);

  var flagged = allTasks.filter(function(t){ var s=ts[t.id]||{}; return !s.dismissed&&!s.checked&&s.flagged; });
  var active = allTasks.filter(function(t){ var s=ts[t.id]||{}; return !s.dismissed&&!s.checked&&!s.flagged; });
  var completed = allTasks.filter(function(t){ var s=ts[t.id]||{}; return s.checked&&!s.dismissed; });
  var dismissed = allTasks.filter(function(t){ var s=ts[t.id]||{}; return s.dismissed; });

  var oPct = overallPct(proj);
  var doneCount = completed.length;
  var totalActive = flagged.length + active.length;
  var pct = (totalActive+doneCount) ? Math.round(doneCount/(totalActive+doneCount)*100) : 100;

  function upd(taskId, patch) {
    var newTs = Object.assign({}, ts);
    newTs[taskId] = Object.assign({}, ts[taskId]||{}, patch);
    props.onUpdate({taskState: newTs});
  }

  function handleCheck(taskId) {
    var cur = ts[taskId]||{};
    var nowChecked = !cur.checked;
    upd(taskId, {checked:nowChecked, completedDate: nowChecked ? new Date().toISOString() : null, flagged:false});
  }

  function handleAddTask() {
    var name = newTaskName.trim();
    if (!name) return;
    var id = mod.id+'__custom__'+Date.now();
    var existing = (proj.customTasks&&proj.customTasks[mod.id])||[];
    var newCustom = Object.assign({}, proj.customTasks||{});
    newCustom[mod.id] = existing.concat([{id:id, name:name, custom:true}]);
    props.onUpdate({customTasks:newCustom});
    setNewTaskName(''); setShowAddTask(false);
  }

  function renderTask(task) {
    return h(Task, {
      key:task.id, task:task, ts:ts[task.id],
      onToggle: function(){ handleCheck(task.id); },
      onDismiss: function(){ upd(task.id, {dismissed:true, flagged:false}); },
      onFlag: function(){ upd(task.id, {flagged:!(ts[task.id]&&ts[task.id].flagged)}); },
      onNote: function(val){ upd(task.id, {note:val}); },
      onPhoto: function(src){ var ex=(ts[task.id]&&ts[task.id].photos)||[]; upd(task.id,{photos:ex.concat([src])}); },
      onDelPhoto: function(idx){ var ex=(ts[task.id]&&ts[task.id].photos)||[]; upd(task.id,{photos:ex.filter(function(_,j){return j!==idx;})}); }
    });
  }

  function handleDownload() {
    var jsPDF = window.jspdf.jsPDF;
    var zip = new JSZip();
    var doc = new jsPDF({unit:'pt', format:'letter'});
    var W = doc.internal.pageSize.getWidth();
    var y = 50;
    function np(){ doc.addPage(); y=50; }
    function chk(n){ if(y+(n||25)>730) np(); }

    doc.setFillColor(0,0,128); doc.rect(0,0,W,60,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(18); doc.setFont('helvetica','bold');
    doc.text('ELEVATOR MODERNIZATION - PROJECT REPORT', W/2, 38, {align:'center'});
    y = 80;
    doc.setTextColor(0,0,0); doc.setFontSize(10); doc.setFont('helvetica','normal');
    var info=[['Building',proj.buildingName],['Job No.',proj.jobNumber],['Key No.',proj.keyNumber||''],['Address',(proj.street||'')+', '+(proj.city||'')],['Tech',proj.techName],['Start Date',proj.startDate],['Progress',oPct+'%'],['Generated',new Date().toLocaleDateString()]];
    info.forEach(function(row,i){
      doc.setFont('helvetica','bold'); doc.text(row[0]+':', 50, y+i*18);
      doc.setFont('helvetica','normal'); doc.text(String(row[1]||''), 150, y+i*18);
    });

    MODULES.forEach(function(m){
      doc.addPage(); y=50;
      doc.setFillColor(0,0,128); doc.rect(0,0,W,30,'F');
      doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont('helvetica','bold');
      doc.text(m.label.toUpperCase(), 50, 20);
      var mAll = buildTasks(m,proj.numFloors).concat((proj.customTasks&&proj.customTasks[m.id])||[]);
      var mActive = mAll.filter(function(t){return !ts[t.id]||!ts[t.id].dismissed;});
      var mDone = mActive.filter(function(t){return ts[t.id]&&ts[t.id].checked;}).length;
      doc.setFontSize(10); doc.text(mDone+'/'+mActive.length+' complete', W-120, 20);
      y = 50;
      mAll.forEach(function(task){
        var s=ts[task.id]||{};
        if(s.dismissed) return;
        chk(18);
        doc.setFontSize(9); doc.setTextColor(0,0,0);
        if(s.checked){ doc.setTextColor(0,100,0); }
        else if(s.flagged){ doc.setTextColor(180,0,0); }
        var prefix = s.checked ? '[x] ' : (s.flagged ? '[!] ' : '[ ] ');
        var suffix = s.checked&&s.completedDate ? '  ('+fmtDate(s.completedDate)+')' : '';
        doc.setFont('helvetica', s.flagged?'bold':'normal');
        doc.text(prefix+task.name+(task.custom?' [custom]':'')+suffix, 50, y); y+=16;
        if(s.note){ chk(13); doc.setFontSize(8); doc.setFont('helvetica','italic'); doc.setTextColor(80,80,80); var lines=doc.splitTextToSize('Note: '+s.note,W-110); doc.text(lines,60,y); y+=lines.length*11; }
        if(s.photos&&s.photos.length){
          s.photos.forEach(function(src,pi){
            chk(75);
            try{ doc.addImage(src,'JPEG',60,y,75,56); zip.file(m.id+'/'+task.id.replace(/[^a-z0-9_]/gi,'_')+'_photo'+(pi+1)+'.jpg',src.split(',')[1],{base64:true}); y+=63; }catch(e){}
          });
        }
      });
    });

    zip.file('report.pdf', doc.output('blob'));
    zip.generateAsync({type:'blob'}).then(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url; a.download=(proj.jobNumber||'project').replace(/\s+/g,'_')+'_report.zip';
      a.click(); URL.revokeObjectURL(url);
    });
  }

  return h('div', {className:'screen'},
    h('div', {className:'titlebar'},
      h('div', null,
        h('div', {className:'titlebar-text'}, 'Elevator Pro - '+proj.buildingName),
        h('div', {className:'titlebar-sub'}, proj.jobNumber+(proj.keyNumber?' | Key: '+proj.keyNumber:'')+' | '+(proj.numFloors||'')+' Floors')
      ),
      h('button', {className:'dl-btn', onClick:handleDownload}, 'Save ZIP')
    ),
    h('div', {className:'tab-bar'},
      MODULES.map(function(m,i){
        var mp=modPct(m,proj);
        return h('button', {key:m.id, className:'tab-btn'+(modIdx===i?' active':'')+(mp===100?' complete':''), onClick:function(){props.setModIdx(i);}}, m.label);
      })
    ),
    h('div', {className:'progress-wrap'},
      h('div', {className:'progress-bar-outer'},
        h('div', {className:'progress-bar-inner', style:{width:oPct+'%'}},
          oPct > 5 ? h('span', {className:'progress-label'}, oPct+'%') : null
        )
      ),
      h('div', {className:'progress-text'}, 'Overall: '+oPct+'% complete')
    ),
    h('div', {className:'scroll'},
      h('div', {className:'task-area'},
        h('div', {className:'mod-header'},
          h('span', {className:'mod-header-text'}, mod.label),
          h('span', {className:'mod-header-prog'}, doneCount+'/'+(totalActive+doneCount)+' complete'+(flagged.length?' | '+flagged.length+' flagged':''))
        ),

        flagged.length > 0 ? h('div', null,
          h('div', {style:{fontSize:'11px',fontWeight:'bold',color:'#800000',padding:'2px 0',marginBottom:3}}, '! PRIORITY ITEMS'),
          flagged.map(function(task){ return renderTask(task); })
        ) : null,

        active.length > 0 ? h('div', null,
          flagged.length > 0 ? h('div', {style:{fontSize:'11px',color:'#000080',fontWeight:'bold',padding:'6px 0 2px 0'}}, 'ACTIVE') : null,
          active.map(function(task){ return renderTask(task); })
        ) : null,

        completed.length > 0 ? h('div', null,
          h('div', {className:'section-hdr green', onClick:function(){setShowCompleted(function(v){return !v;})}},
            h('span', null, 'Completed ('+completed.length+')'),
            h('span', null, showCompleted ? '[Hide]' : '[Show]')
          ),
          showCompleted ? completed.map(function(task){
            return h('div', {key:task.id, className:'completed-item'},
              h('div', {className:'completed-check', onClick:function(){handleCheck(task.id);}, title:'Mark incomplete'},
                h('span', {className:'chk-mark'}, 'x')
              ),
              h('div', {style:{flex:1}},
                h('div', {className:'completed-text'}, task.name+(task.custom?' *':'')),
                h('div', {className:'completed-date'}, 'Completed: '+fmtDate(ts[task.id]&&ts[task.id].completedDate)),
                ts[task.id]&&ts[task.id].note ? h('div', {className:'completed-note'}, 'Note: '+ts[task.id].note) : null
              )
            );
          }) : null
        ) : null,

        dismissed.length > 0 ? h('div', null,
          h('div', {className:'section-hdr red', onClick:function(){setShowDismissed(function(v){return !v;})}},
            h('span', null, 'Dismissed ('+dismissed.length+')'),
            h('span', null, showDismissed ? '[Hide]' : '[Show]')
          ),
          showDismissed ? dismissed.map(function(task){
            return h('div', {key:task.id, className:'dismissed-item'},
              h('span', {className:'dismissed-text'}, task.name),
              h('button', {className:'btn95 small', onClick:function(){upd(task.id,{dismissed:false});}}, 'Restore')
            );
          }) : null
        ) : null,

        h('div', {className:'add-task-wrap'},
          !showAddTask ? h('button', {className:'btn95 full', onClick:function(){setShowAddTask(true);}}, '+ Add Task') : null,
          showAddTask ? h('div', {className:'add-task-form'},
            h('div', {style:{fontWeight:'bold',marginBottom:6,fontSize:12}}, 'Add Custom Task'),
            h('input', {className:'add-task-inp', placeholder:'Task name...', value:newTaskName, autoFocus:true,
              onChange:function(e){setNewTaskName(e.target.value);},
              onKeyDown:function(e){if(e.key==='Enter')handleAddTask();if(e.key==='Escape'){setShowAddTask(false);setNewTaskName('');}}}),
            h('div', {className:'add-task-btns'},
              h('button', {className:'btn95', onClick:function(){setShowAddTask(false);setNewTaskName('');}}, 'Cancel'),
              h('button', {className:'btn95', style:{fontWeight:'bold'}, onClick:handleAddTask}, 'Add Task')
            )
          ) : null
        )
      )
    ),
    h('div', {className:'bot-nav'},
      h('button', {className:'nav-btn back-btn', disabled:modIdx===0, onClick:function(){props.setModIdx(function(i){return i-1;});}}, '< Back'),
      h('span', {className:'nav-ctr'}, (modIdx+1)+' of '+MODULES.length),
      h('button', {className:'nav-btn back-btn', disabled:modIdx===MODULES.length-1, onClick:function(){props.setModIdx(function(i){return i+1;});}}, 'Next >')
    ),
    h('div', {className:'statusbar'},
      h('span', {className:'status-cell'}, proj.buildingName),
      h('span', {className:'status-cell'}, mod.label+': '+pct+'%'),
      h('span', {className:'status-cell'}, 'Overall: '+oPct+'%')
    )
  );
}

// ---- NEW PROJECT FORM ----
function NewProject(props) {
  var fState = useState({buildingName:'',jobNumber:'',keyNumber:'',street:'',city:'',startDate:new Date().toISOString().split('T')[0],techName:'',numFloors:'2'});
  var f = fState[0]; var setF = fState[1];
  function set(k,v){ setF(function(p){var n=Object.assign({},p);n[k]=v;return n;}); }
  var valid = f.buildingName.trim() && f.jobNumber.trim();
  function inp(label,key,type,placeholder){
    return h('div', null,
      h('label', {className:'form-lbl'}, label),
      h('input', {className:'form-inp', type:type||'text', placeholder:placeholder||'', value:f[key], onChange:function(e){set(key,e.target.value);}})
    );
  }
  return h('div', {className:'screen'},
    h('div', {className:'titlebar'},
      h('div', {className:'titlebar-text'}, 'Elevator Pro - New Project')
    ),
    h('div', {className:'scroll'},
      h('div', {className:'form-wrap'},
        h('div', {className:'form-section'},
          h('div', {className:'form-row'}, inp('Building Name *','buildingName','text','e.g. Harbour Centre')),
          h('div', {className:'form-row-2'},
            inp('Job Number *','jobNumber','text','e.g. EL-2024-047'),
            inp('Key Number','keyNumber','text','e.g. K-042')
          ),
          h('div', {className:'form-row'}, inp('Street Address','street','text','123 Main Street')),
          h('div', {className:'form-row-2'},
            inp('City','city','text','Victoria'),
            inp('Number of Floors','numFloors','number','2')
          ),
          h('div', {className:'form-row-2'},
            inp('Start Date','startDate','date',''),
            inp('Tech Name','techName','text','Your name')
          ),
          h('button', {className:'btn95 primary', disabled:!valid, style:{opacity:valid?1:0.5}, onClick:function(){
            props.onSave(Object.assign({},f,{id:Date.now().toString(),taskState:{},customTasks:{},createdAt:new Date().toISOString()}));
          }}, 'Create Project'),
          h('button', {className:'btn95 full', style:{marginTop:6}, onClick:props.onCancel}, 'Cancel')
        )
      )
    )
  );
}

// ---- DASHBOARD ----
function Dashboard(props) {
  var cState = useState(null); var confirmId = cState[0]; var setConfirmId = cState[1];
  return h('div', {className:'screen'},
    h('div', {className:'titlebar'},
      h('div', null,
        h('div', {className:'titlebar-text'}, 'Elevator Pro'),
        h('div', {className:'titlebar-sub'}, 'Modernization Checklist')
      )
    ),
    h('div', {className:'scroll'},
      h('div', {className:'proj-list'},
        h('button', {className:'btn95 primary', onClick:props.onCreate}, '+ New Project'),
        props.projects.length===0 ? h('div', {className:'empty-state'}, 'No projects found. Click New Project to begin.') : null,
        props.projects.map(function(proj){
          var pct=overallPct(proj);
          return h('div', {key:proj.id, className:'proj-card', onClick:function(){props.onOpen(proj.id);}},
            h('div', {className:'proj-title-bar'},
              h('span', {className:'proj-title-text'}, proj.buildingName),
              h('span', {className:'proj-pct-text'}, pct+'%')
            ),
            h('div', {className:'proj-meta'}, 'Job: '+proj.jobNumber+(proj.keyNumber?' | Key: '+proj.keyNumber:'')),
            h('div', {className:'proj-meta'}, (proj.city||'')+' | '+(proj.numFloors||'')+' floors | '+(proj.techName||'')),
            h('div', {className:'proj-meta'}, 'Started: '+(proj.startDate||'')),
            h('div', {className:'proj-pbar-outer'}, h('div', {className:'proj-pbar-inner', style:{width:pct+'%'}})),
            h('div', {className:'proj-btns', onClick:function(e){e.stopPropagation();}},
              h('button', {className:'btn95', onClick:function(){props.onOpen(proj.id);}}, 'Open'),
              h('button', {className:'btn95 danger', onClick:function(){setConfirmId(proj.id);}}, 'Delete')
            )
          );
        })
      )
    ),
    h('div', {className:'statusbar'},
      h('span', {className:'status-cell'}, props.projects.length+' project'+(props.projects.length!==1?'s':'')+' loaded')
    ),
    confirmId ? h('div', {className:'modal-ov'},
      h('div', {className:'modal-win'},
        h('div', {className:'modal-titlebar'}, h('span', {className:'modal-title-text'}, 'Confirm Delete')),
        h('div', {className:'modal-body'},
          h('div', {className:'modal-msg'}, 'Delete this project and all its data? This cannot be undone.'),
          h('div', {className:'modal-btns'},
            h('button', {className:'btn95', onClick:function(){setConfirmId(null);}}, 'Cancel'),
            h('button', {className:'btn95 danger', style:{fontWeight:'bold'}, onClick:function(){props.onDelete(confirmId);setConfirmId(null);}}, 'Delete')
          )
        )
      )
    ) : null
  );
}

// ---- APP ROOT ----
function App() {
  var pState = useState(loadAll); var projects = pState[0]; var setProjects = pState[1];
  var vState = useState('dashboard'); var view = vState[0]; var setView = vState[1];
  var aState = useState(null); var activeId = aState[0]; var setActiveId = aState[1];
  var mState = useState(0); var modIdx = mState[0]; var setModIdx = mState[1];

  function save(p){ setProjects(p); saveAll(p); }
  var activeProj = projects.filter(function(p){return p.id===activeId;})[0];

  if(view==='new') return h(NewProject,{
    onSave:function(proj){save([proj].concat(projects));setActiveId(proj.id);setModIdx(0);setView('project');},
    onCancel:function(){setView('dashboard');}
  });
  if(view==='project'&&activeProj) return h(ModuleView,{
    proj:activeProj, modIdx:modIdx, setModIdx:setModIdx,
    onUpdate:function(patch){save(projects.map(function(p){return p.id===activeId?Object.assign({},p,patch):p;}));},
    onBack:function(){setView('dashboard');}
  });
  return h(Dashboard,{
    projects:projects,
    onOpen:function(id){setActiveId(id);setModIdx(0);setView('project');},
    onCreate:function(){setView('new');},
    onDelete:function(id){save(projects.filter(function(p){return p.id!==id;}));}
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
})();
</script>
